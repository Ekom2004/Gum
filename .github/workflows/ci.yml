name: CI

on:
  push:
  pull_request:

jobs:
  sdk-tests:
    name: SDK Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK (editable)
        run: python -m pip install -e ./sdk

      - name: Smoke import
        run: python -c "import gum; print('gum import ok')"

      - name: Run SDK unit tests
        run: python -m unittest discover -s sdk/tests -p "test_*.py"
