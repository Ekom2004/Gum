name: Release PyPI

on:
  push:
    tags:
      - "usegum-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi
      dry_run:
        description: "Build and check only (skip upload)"
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build SDK artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build ./sdk

      - name: Check metadata
        run: python -m twine check sdk/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usegum-dist
          path: sdk/dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/usegum-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi' && !inputs.dry_run)
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: usegum-dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'testpypi' &&
      !inputs.dry_run
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: usegum-dist
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
