name: SDK Build

on:
  push:
    paths:
      - ".github/workflows/sdk-build.yml"
      - "sdk/**"
  pull_request:
    paths:
      - ".github/workflows/sdk-build.yml"
      - "sdk/**"
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install SDK
        run: python -m pip install -e ./sdk

      - name: Verify import
        run: python -c "import mx8; print(mx8.__file__)"

      - name: Run SDK tests
        run: python -m unittest discover -s sdk/tests -p "test_*.py"

      - name: Build package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python -m build --sdist --wheel ./sdk --outdir ./dist

      - name: Check package metadata
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python -m twine check ./dist/*

      - name: Upload package artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: mx8-sdk-dist
          path: dist/*

