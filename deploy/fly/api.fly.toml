app = "gum-api-stg"
primary_region = "yyz"

[build]
dockerfile = "Dockerfile.api"

[env]
RUST_LOG = "info"
GUM_API_BIND_ADDR = "0.0.0.0"
GUM_API_PORT = "8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
